# ABOUTME: Production Docker Compose for the full pleasehold stack.
# ABOUTME: Starts PostgreSQL, Redis, runs migrations, then launches API, worker, and web dashboard.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pleasehold}
      POSTGRES_USER: ${POSTGRES_USER:-pleasehold}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - pleasehold
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pleasehold} -d ${POSTGRES_DB:-pleasehold}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    networks:
      - pleasehold
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    command: pnpm db:migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pleasehold}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pleasehold}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pleasehold
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pleasehold}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pleasehold}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3001
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      API_URL: ${API_URL:-http://localhost:3001}
      WEB_URL: ${WEB_URL:-http://localhost:8080}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - pleasehold

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pleasehold}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pleasehold}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_URL: ${API_URL:-http://localhost:3001}
      WEB_URL: ${WEB_URL:-http://localhost:8080}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - pleasehold

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api
    networks:
      - pleasehold

volumes:
  postgres-data:
  redis-data:

networks:
  pleasehold:
    driver: bridge
