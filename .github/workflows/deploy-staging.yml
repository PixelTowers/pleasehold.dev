name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/pixeltowers/pleasehold/api:${{ github.sha }}

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/pixeltowers/pleasehold/web:${{ github.sha }}
          build-args: VITE_API_URL=

      - name: Build & push Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ghcr.io/pixeltowers/pleasehold/worker:${{ github.sha }}

  notify-deploy-start:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord of deploy start
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"🚀 pleasehold Staging Deploy Started\",\"description\":\"Deploying commit \`${GITHUB_SHA::7}\` to **staging**\",\"color\":3447003,\"fields\":[{\"name\":\"Triggered by\",\"value\":\"${{ github.actor }}\",\"inline\":true},{\"name\":\"Workflow\",\"value\":\"[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",\"inline\":true}]}]}" \
            "$DISCORD_WEBHOOK_URL"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: PixelTowers/infra
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          ref: main

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update all 3 image tags
        working-directory: k8s/apps/pleasehold-staging
        run: |
          kustomize edit set image \
            api=ghcr.io/pixeltowers/pleasehold/api:${{ needs.build.outputs.tag }} \
            web=ghcr.io/pixeltowers/pleasehold/web:${{ needs.build.outputs.tag }} \
            worker=ghcr.io/pixeltowers/pleasehold/worker:${{ needs.build.outputs.tag }}

      - name: Commit and push with retry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/apps/pleasehold-staging/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "deploy: pleasehold staging → ${{ needs.build.outputs.tag }}"
          for attempt in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Retry $attempt..."
            git pull --rebase
          done
          exit 1

  notify-deploy-success:
    needs: [deploy]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Notify Discord of deploy success
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"✅ pleasehold Staging Deploy Succeeded\",\"description\":\"Commit \`${GITHUB_SHA::7}\` is live on **staging**\",\"color\":3066993,\"fields\":[{\"name\":\"Triggered by\",\"value\":\"${{ github.actor }}\",\"inline\":true},{\"name\":\"Workflow\",\"value\":\"[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",\"inline\":true}]}]}" \
            "$DISCORD_WEBHOOK_URL"

  notify-deploy-failure:
    needs: [deploy]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Notify Discord of deploy failure
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"❌ pleasehold Staging Deploy Failed\",\"description\":\"Deploy of commit \`${GITHUB_SHA::7}\` to **staging** failed\",\"color\":15158332,\"fields\":[{\"name\":\"Triggered by\",\"value\":\"${{ github.actor }}\",\"inline\":true},{\"name\":\"Workflow\",\"value\":\"[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",\"inline\":true}]}]}" \
            "$DISCORD_WEBHOOK_URL"
