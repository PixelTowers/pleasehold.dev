name: Deploy www

on:
  push:
    branches: [main]
    paths:
      - "apps/www/**"
      - ".github/workflows/deploy-www.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/www/**"
      - ".github/workflows/deploy-www.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @pleasehold/www build

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/www
          command: pages deploy dist --project-name=pleasehold-www --branch=${{ github.head_ref || github.ref_name }}
